<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction | Air Quality Prediction System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<!-- The page is showing the prediction form here. -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Air Quality Prediction</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="/prediction">Prediction</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- The page is presenting the prediction inputs here. -->
<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="fw-bold text-success">Air Quality Prediction</h1>
    </div>

    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h3 class="mb-0">Prediction Form</h3>
        </div>
        <div class="card-body">
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form action="/predict" method="POST" onsubmit="return confirmPrediction()">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">PM10</label><input class="form-control" type="number" step="any" name="PM10" required></div>
                    <div class="col-md-6"><label class="form-label">SO2</label><input class="form-control" type="number" step="any" name="SO2" required></div>
                    <div class="col-md-6"><label class="form-label">NO2</label><input class="form-control" type="number" step="any" name="NO2" required></div>
                    <div class="col-md-6"><label class="form-label">CO</label><input class="form-control" type="number" step="any" name="CO" required></div>
                    <div class="col-md-6"><label class="form-label">O3</label><input class="form-control" type="number" step="any" name="O3" required></div>
                    <div class="col-md-6"><label class="form-label">Temperature</label><input class="form-control" type="number" step="any" name="TEMP" required></div>
                    <div class="col-md-6"><label class="form-label">Pressure</label><input class="form-control" type="number" step="any" name="PRES" required></div>
                    <div class="col-md-6"><label class="form-label">Dew Point</label><input class="form-control" type="number" step="any" name="DEWP" required></div>
                    <div class="col-md-6"><label class="form-label">Rain</label><input class="form-control" type="number" step="any" name="RAIN" required></div>
                    <div class="col-md-6"><label class="form-label">Wind Speed (WSPM)</label><input class="form-control" type="number" step="any" name="WSPM" required></div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-success btn-lg">Predict Air Quality</button>
                    <button type="reset" class="btn btn-secondary btn-lg ms-2">Reset</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3">
    &copy; 2026 Air Quality Prediction System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
